<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fracasso Podcast</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #2a1a5e;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 1rem 3rem;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -80px; left: -80px;
    width: 320px; height: 320px;
    border-radius: 50%;
    background: radial-gradient(circle, #e8730a33, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -80px; right: -80px;
    width: 320px; height: 320px;
    border-radius: 50%;
    background: radial-gradient(circle, #9b5de533, transparent 70%);
    pointer-events: none;
  }
  .flames {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, #e8730a, #9b5de5, #e8730a, #9b5de5);
    background-size: 200% 100%;
    animation: slide 3s linear infinite;
    z-index: 10;
  }
  @keyframes slide {
    0% { background-position: 0% 0; }
    100% { background-position: 200% 0; }
  }
  .logo {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #e8730a;
    box-shadow: 0 0 0 5px #9b5de544, 0 8px 32px #00000066;
    margin-bottom: 1.1rem;
    position: relative;
    z-index: 1;
  }
  h1 {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 0.3rem;
    text-align: center;
    letter-spacing: 1.5px;
    position: relative;
    z-index: 1;
  }
  .tagline {
    font-size: 13px;
    color: #c9a8e8;
    margin-bottom: 2.2rem;
    text-align: center;
    letter-spacing: 0.5px;
    position: relative;
    z-index: 1;
  }
  .links {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
  }
  a.btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 15px 22px;
    border-radius: 14px;
    text-decoration: none;
    font-size: 15px;
    font-weight: 600;
    transition: transform 0.15s ease, filter 0.15s ease, box-shadow 0.15s ease;
    border: 1.5px solid transparent;
    cursor: pointer;
    letter-spacing: 0.3px;
  }
  a.btn:hover {
    transform: scale(1.035);
    filter: brightness(1.12);
    box-shadow: 0 6px 24px #00000055;
  }
  a.btn svg {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
  }
  .btn-instagram {
    background: linear-gradient(135deg, #f9a825, #e91e8c, #9c27b0);
    color: #fff;
    border-color: #ffffff22;
  }
  .btn-tiktok {
    background: #111;
    color: #fff;
    border: 1.5px solid #69c9d0;
  }
  .btn-youtube {
    background: #ff0000;
    color: #fff;
    border-color: #ffffff22;
  }
  .btn-spotify {
    background: #1db954;
    color: #fff;
    border-color: #ffffff22;
  }
  footer {
    margin-top: 2.8rem;
    font-size: 11px;
    color: #6b4e9a;
    text-align: center;
    position: relative;
    z-index: 1;
  }
</style>
</head>
